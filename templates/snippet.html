{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ config.title }}{% endblock %}

{% block content %}
<main class="page container">
  <article class="snippet-detail stack">
    <a href="/snippets/" class="muted back-link">← Back to snippets</a>
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date }}" class="muted">{{ page.date }}</time>
    <p class="muted snippet-filename">{{ page.extra.filename | default(value="") }}</p>
    <div class="snippet-content">
      {{ page.content | safe }}
    </div>
  </article>
</main>
{% endblock %}
