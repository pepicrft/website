name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise tools (elixir + wrangler)
        uses: jdx/mise-action@v2

      - name: Fetch deps
        run: mix deps.get

      - name: Build site
        env:
          MIX_ENV: prod
        run: mix tableau.build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME || 'pepicrft' }}
        run: |
          wrangler pages deploy ./build --project-name "$CF_PAGES_PROJECT_NAME" --branch main --commit-dirty=true
